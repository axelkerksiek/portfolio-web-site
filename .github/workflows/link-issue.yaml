name: Link Issue to PR

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  link-issue:
    name: Auto-link Issue
    runs-on: ubuntu-latest
    steps:
      - name: Extract issue number from branch and update PR body
        uses: actions/github-script@v8
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const match = branch.match(/\/(\d+)-/);
            const currentBody = context.payload.pull_request.body || '';

            const closing = match ? `Closes #${match[1]}` : 'Closes #';

            if (currentBody.includes(closing)) return;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: `${closing}\n\n${currentBody}`.trim()
            });
